<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CleanStay — Panel del Arrendador</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Tokens ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink:       #0f1117;
      --ink-2:     #3a3d4a;
      --ink-3:     #7a7f8e;
      --surface:   #ffffff;
      --surface-2: #f5f5f7;
      --surface-3: #ecedf0;
      --accent:    #1a56e8;
      --accent-2:  #0d3ec8;
      --accent-bg: #eef2fd;
      --success:   #15803d;
      --success-bg:#dcfce7;
      --warn:      #b45309;
      --warn-bg:   #fef3c7;
      --danger:    #b91c1c;
      --danger-bg: #fee2e2;
      --border:    rgba(0,0,0,0.08);
      --radius:    14px;
      --radius-sm: 8px;
      --shadow:    0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
      --font:      'Sora', sans-serif;
      --mono:      'DM Mono', monospace;
      --transition: 200ms cubic-bezier(0.4,0,0.2,1);
    }
    body {
      font-family: var(--font);
      background: var(--surface-2);
      color: var(--ink);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
    }
    /* ─── Auth Screen ────────────────────────────────── */
    #auth-root {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, #f0f4ff 0%, #fafafa 60%, #f5f0ff 100%);
    }
    .auth-card {
      background: var(--surface);
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 8px 40px rgba(0,0,0,0.08);
      padding: 40px 44px;
      width: 100%;
      max-width: 420px;
    }
    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .auth-logo-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .auth-logo-icon svg { width: 20px; height: 20px; }
    .auth-logo-text { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
    .auth-logo-text span { color: var(--accent); }
    .auth-title { font-size: 22px; font-weight: 600; margin-bottom: 6px; letter-spacing: -0.4px; }
    .auth-sub { color: var(--ink-3); margin-bottom: 28px; font-size: 13.5px; }
    .tabs {
      display: flex;
      background: var(--surface-2);
      border-radius: var(--radius-sm);
      padding: 4px;
      gap: 4px;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1;
      padding: 8px;
      border: none;
      background: transparent;
      border-radius: 6px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--ink-3);
      transition: all var(--transition);
    }
    .tab.active { background: var(--surface); color: var(--ink); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12.5px; font-weight: 500; color: var(--ink-2); margin-bottom: 6px; }
    .field input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 14px;
      background: var(--surface);
      color: var(--ink);
      transition: border-color var(--transition), box-shadow var(--transition);
      outline: none;
    }
    .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
    .field input::placeholder { color: var(--ink-3); }
    .btn-primary {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition);
      margin-top: 4px;
    }
    .btn-primary:hover { background: var(--accent-2); }
    .btn-primary:active { transform: scale(0.99); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-banner {
      background: var(--danger-bg);
      color: var(--danger);
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    /* ─── App Shell ──────────────────────────────────── */
    #app-root { display: flex; min-height: 100vh; }
    .sidebar {
      width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
    }
    .sidebar-header {
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo {
      display: flex; align-items: center; gap: 8px;
      font-size: 15px; font-weight: 600; letter-spacing: -0.3px;
    }
    .sidebar-logo-icon {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .sidebar-logo-icon svg { width: 15px; height: 15px; }
    .sidebar-nav { padding: 12px 10px; flex: 1; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      font-size: 13.5px;
      font-weight: 500;
      color: var(--ink-2);
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
      font-family: var(--font);
    }
    .nav-item:hover { background: var(--surface-2); color: var(--ink); }
    .nav-item.active { background: var(--accent-bg); color: var(--accent); }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
    .notif-badge {
      margin-left: auto;
      background: var(--danger);
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      border-radius: 10px;
      padding: 2px 6px;
      min-width: 18px;
      text-align: center;
    }
    .sidebar-user {
      padding: 16px 16px 20px;
      border-top: 1px solid var(--border);
    }
    .user-card {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
    }
    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600;
      flex-shrink: 0;
    }
    .avatar-blue { background: var(--accent-bg); color: var(--accent); }
    .user-name { font-size: 13px; font-weight: 500; }
    .user-role { font-size: 11.5px; color: var(--ink-3); }
    .btn-logout {
      margin-top: 8px;
      width: 100%;
      padding: 7px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 12.5px;
      cursor: pointer;
      background: transparent;
      color: var(--ink-3);
      transition: all var(--transition);
    }
    .btn-logout:hover { background: var(--surface-2); color: var(--ink); }
    /* ─── Main Content ───────────────────────────────── */
    .main { margin-left: 240px; flex: 1; padding: 32px 36px; max-width: 1200px; }
    .page-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 28px;
    }
    .page-title { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
    .page-sub { color: var(--ink-3); font-size: 13.5px; margin-top: 4px; }
    /* ─── Stats ──────────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
    }
    .stat-label { font-size: 12px; color: var(--ink-3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 28px; font-weight: 600; letter-spacing: -1px; margin-top: 6px; }
    .stat-sub { font-size: 12px; color: var(--ink-3); margin-top: 2px; }
    .stat-card.accent { background: var(--accent); }
    .stat-card.accent .stat-label,
    .stat-card.accent .stat-value,
    .stat-card.accent .stat-sub { color: rgba(255,255,255,0.9); }
    /* ─── Cards / Panels ─────────────────────────────── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
    }
    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .panel-title { font-size: 15px; font-weight: 600; }
    .panel-sub { font-size: 13px; color: var(--ink-3); margin-top: 2px; }
    /* ─── Filters ────────────────────────────────────── */
    .filters {
      display: flex; gap: 10px; margin-bottom: 20px;
      flex-wrap: wrap; align-items: center;
    }
    .filter-input {
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 13.5px;
      background: var(--surface);
      color: var(--ink);
      outline: none;
      flex: 1; min-width: 200px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .filter-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
    .filter-select {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 13.5px;
      background: var(--surface);
      color: var(--ink);
      outline: none;
      cursor: pointer;
    }
    /* ─── Prestador Cards ────────────────────────────── */
    .prestadores-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .prestador-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: box-shadow var(--transition), transform var(--transition), border-color var(--transition);
      cursor: pointer;
    }
    .prestador-card:hover {
      box-shadow: var(--shadow);
      transform: translateY(-1px);
      border-color: rgba(26,86,232,0.15);
    }
    .prestador-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .prestador-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 600;
      flex-shrink: 0;
    }
    .prestador-name { font-size: 14.5px; font-weight: 600; }
    .prestador-email { font-size: 12px; color: var(--ink-3); margin-top: 2px; }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11.5px;
      font-weight: 500;
    }
    .badge-green { background: var(--success-bg); color: var(--success); }
    .badge-yellow { background: var(--warn-bg); color: var(--warn); }
    .badge-red { background: var(--danger-bg); color: var(--danger); }
    .badge-blue { background: var(--accent-bg); color: var(--accent); }
    .badge-gray { background: var(--surface-3); color: var(--ink-2); }
    .disponibilidad-list { margin-top: 12px; }
    .disponibilidad-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px;
      background: var(--surface-2);
      border-radius: var(--radius-sm);
      margin-bottom: 6px;
      font-size: 12.5px;
    }
    .disp-date { font-weight: 500; color: var(--ink-2); }
    .disp-hora { color: var(--ink-3); font-size: 12px; }
    .btn-contratar {
      width: 100%;
      margin-top: 14px;
      padding: 9px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition);
    }
    .btn-contratar:hover { background: var(--accent-2); }
    .btn-contratar:disabled { opacity: 0.5; cursor: not-allowed; }
    /* ─── Contrataciones list ────────────────────────── */
    .contratar-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 10px;
      background: var(--surface);
      transition: box-shadow var(--transition);
    }
    .contratar-row:hover { box-shadow: var(--shadow); }
    .contratar-info { flex: 1; }
    .contratar-name { font-size: 14px; font-weight: 500; }
    .contratar-meta { font-size: 12px; color: var(--ink-3); margin-top: 2px; }
    .contratar-date { font-size: 12px; color: var(--ink-3); font-family: var(--mono); white-space: nowrap; }
    /* ─── Modal ──────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
      padding: 24px;
      backdrop-filter: blur(4px);
    }
    .modal {
      background: var(--surface);
      border-radius: 20px;
      padding: 32px;
      width: 100%; max-width: 420px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.15);
      animation: modal-in 200ms ease-out;
    }
    @keyframes modal-in {
      from { opacity: 0; transform: scale(0.97) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
    .modal-sub { font-size: 13px; color: var(--ink-3); margin-bottom: 22px; }
    .modal-field { margin-bottom: 14px; }
    .modal-field label { display: block; font-size: 12.5px; font-weight: 500; color: var(--ink-2); margin-bottom: 6px; }
    .modal-field select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 14px;
      background: var(--surface);
      color: var(--ink);
      outline: none;
      cursor: pointer;
    }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-cancel {
      flex: 1; padding: 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font); font-size: 14px;
      cursor: pointer; background: transparent; color: var(--ink);
      transition: background var(--transition);
    }
    .btn-cancel:hover { background: var(--surface-2); }
    .btn-confirm {
      flex: 1; padding: 10px;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius-sm);
      font-family: var(--font); font-size: 14px; font-weight: 500;
      cursor: pointer; transition: background var(--transition);
    }
    .btn-confirm:hover { background: var(--accent-2); }
    .btn-confirm:disabled { opacity: 0.5; cursor: not-allowed; }
    /* ─── Empty state ────────────────────────────────── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-3);
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-title { font-size: 16px; font-weight: 500; color: var(--ink-2); margin-bottom: 6px; }
    .empty-text { font-size: 13.5px; }
    /* ─── Toast ──────────────────────────────────────── */
    .toast-container {
      position: fixed; top: 20px; right: 20px;
      z-index: 300;
      display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      padding: 12px 18px;
      border-radius: var(--radius-sm);
      font-size: 13.5px; font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      animation: toast-in 250ms ease-out;
      display: flex; align-items: center; gap: 8px;
      max-width: 320px;
    }
    @keyframes toast-in {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .toast-success { background: #f0fdf4; color: var(--success); border: 1px solid #bbf7d0; }
    .toast-error   { background: #fef2f2; color: var(--danger);  border: 1px solid #fecaca; }
    .toast-info    { background: var(--accent-bg); color: var(--accent); border: 1px solid #bfdbfe; }
    /* ─── Loading ────────────────────────────────────── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 600ms linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay {
      display: flex; align-items: center; justify-content: center;
      padding: 40px;
      color: var(--ink-3);
      gap: 10px;
    }
    .spinner-dark {
      width: 18px; height: 18px;
      border: 2px solid var(--surface-3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 600ms linear infinite;
    }
    /* ─── Responsive ─────────────────────────────────── */
    @media (max-width: 860px) {
      .sidebar { width: 64px; }
      .sidebar-header, .sidebar-user, .nav-item span, .nav-item .notif-badge,
      .user-name, .user-role, .btn-logout, .sidebar-logo span,
      .auth-logo-text span.brand { display: none; }
      .sidebar-logo { justify-content: center; }
      .nav-item { justify-content: center; padding: 12px; }
      .main { margin-left: 64px; padding: 20px; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 580px) {
      .stats-grid { grid-template-columns: 1fr; }
      .prestadores-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel (desarrollo - en prod usar build de Vite/CRA) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    /* ══════════════════════════════════════════════════
       CONFIG — Cambia API_BASE_URL a tu URL de backend
       ══════════════════════════════════════════════════ */
    const API_BASE_URL = window.location.hostname === 'localhost'
      ? 'http://localhost:3001/api'   // backend local
      : '/api';                        // mismo servidor en prod

    /* ──── API helpers ──────────────────────────────── */
    const getToken = () => localStorage.getItem('cs_token');

    async function apiCall(method, path, body = null) {
      const headers = { 'Content-Type': 'application/json' };
      const token = getToken();
      if (token) headers['Authorization'] = `Bearer ${token}`;

      const res = await fetch(`${API_BASE_URL}${path}`, {
        method,
        headers,
        body: body ? JSON.stringify(body) : undefined,
      });

      if (res.status === 401) {
        localStorage.removeItem('cs_token');
        localStorage.removeItem('cs_user');
        window.location.reload();
      }

      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Error en el servidor');
      return data;
    }

    /* ──── Toast system ─────────────────────────────── */
    let toastSetState = null;
    function toast(msg, type = 'info') {
      if (toastSetState) toastSetState(prev => [...prev, { id: Date.now(), msg, type }]);
    }

    function ToastContainer() {
      const [toasts, setToasts] = useState([]);
      toastSetState = setToasts;
      useEffect(() => {
        if (toasts.length === 0) return;
        const id = setTimeout(() => setToasts(t => t.slice(1)), 3500);
        return () => clearTimeout(id);
      }, [toasts]);
      const icons = { success: '✓', error: '✕', info: 'ℹ' };
      return (
        <div className="toast-container">
          {toasts.map(t => (
            <div key={t.id} className={`toast toast-${t.type}`}>
              <span>{icons[t.type]}</span>
              {t.msg}
            </div>
          ))}
        </div>
      );
    }

    /* ──── SVG Icons ────────────────────────────────── */
    const IconBroom   = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3l4 4-3.5 3.5-4-4L17 3z"/><path d="M14 7L2 21"/><path d="M5 18l-3 3"/></svg>;
    const IconHome    = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
    const IconUsers   = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>;
    const IconList    = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>;
    const IconBell    = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>;

    /* ──── Avatar helper ────────────────────────────── */
    const COLORS = ['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981','#06b6d4'];
    function getAvatar(name = '') {
      const initials = name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
      const color = COLORS[name.charCodeAt(0) % COLORS.length];
      return { initials, color };
    }

    /* ──── Formato fecha ────────────────────────────── */
    function fmtDate(d) {
      return new Date(d + 'T00:00:00').toLocaleDateString('es-CO', { day: 'numeric', month: 'short' });
    }
    function fmtDateTime(d) {
      return new Date(d).toLocaleString('es-CO', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
    }

    /* ══════════════════════════════════════════════════
       AUTH SCREEN
       ══════════════════════════════════════════════════ */
    function AuthScreen({ onAuth }) {
      const [tab, setTab] = useState('login');
      const [form, setForm] = useState({ nombre: '', apellido: '', email: '', password: '' });
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));

      async function submit() {
        setError('');
        setLoading(true);
        try {
          if (tab === 'login') {
            const data = await apiCall('POST', '/auth/login', {
              email: form.email,
              password: form.password,
            });
            if (data.user.rol !== 'arrendador') {
              setError('Esta aplicación es para arrendadores. Usa el portal de prestadores.');
              setLoading(false); return;
            }
            localStorage.setItem('cs_token', data.token);
            localStorage.setItem('cs_user', JSON.stringify(data.user));
            onAuth(data.user);
          } else {
            if (!form.nombre || !form.apellido || !form.email || !form.password) {
              setError('Completa todos los campos.'); setLoading(false); return;
            }
            await apiCall('POST', '/auth/register', { ...form, rol: 'arrendador' });
            toast('Cuenta creada. Inicia sesión.', 'success');
            setTab('login');
          }
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      }

      return (
        <div id="auth-root">
          <div className="auth-card">
            <div className="auth-logo">
              <div className="auth-logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round"><path d="M17 3l4 4-3.5 3.5-4-4L17 3z"/><path d="M14 7L2 21"/></svg>
              </div>
              <span className="auth-logo-text">Clean<span>Stay</span></span>
            </div>
            <h1 className="auth-title">{tab === 'login' ? 'Bienvenido de vuelta' : 'Crea tu cuenta'}</h1>
            <p className="auth-sub">
              {tab === 'login' ? 'Accede a tu panel de arrendador' : 'Empieza a encontrar limpiadores hoy'}
            </p>

            <div className="tabs">
              <button className={`tab ${tab === 'login' ? 'active' : ''}`} onClick={() => { setTab('login'); setError(''); }}>Iniciar sesión</button>
              <button className={`tab ${tab === 'register' ? 'active' : ''}`} onClick={() => { setTab('register'); setError(''); }}>Registrarse</button>
            </div>

            {error && <div className="error-banner"><span>✕</span>{error}</div>}

            {tab === 'register' && (
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' }}>
                <div className="field"><label>Nombre</label><input placeholder="Juan" value={form.nombre} onChange={set('nombre')} /></div>
                <div className="field"><label>Apellido</label><input placeholder="Pérez" value={form.apellido} onChange={set('apellido')} /></div>
              </div>
            )}
            <div className="field"><label>Correo electrónico</label><input type="email" placeholder="juan@email.com" value={form.email} onChange={set('email')} /></div>
            <div className="field"><label>Contraseña</label><input type="password" placeholder="••••••••" value={form.password} onChange={set('password')} onKeyDown={e => e.key === 'Enter' && submit()} /></div>

            <button className="btn-primary" onClick={submit} disabled={loading}>
              {loading ? <span className="spinner" /> : (tab === 'login' ? 'Ingresar' : 'Crear cuenta')}
            </button>
          </div>
          <ToastContainer />
        </div>
      );
    }

    /* ══════════════════════════════════════════════════
       MODAL CONTRATAR
       ══════════════════════════════════════════════════ */
    function ModalContratar({ prestador, onClose, onSuccess }) {
      const [dispId, setDispId] = useState('');
      const [loading, setLoading] = useState(false);

      const disps = (prestador.disponibilidades || []).filter(d => d.estado === 'disponible');

      async function confirmar() {
        if (!dispId) { toast('Selecciona una disponibilidad', 'error'); return; }
        setLoading(true);
        try {
          await apiCall('POST', '/contrataciones', {
            prestador_id: prestador.id,
            disponibilidad_id: dispId,
          });
          toast(`Solicitud enviada a ${prestador.nombre}`, 'success');
          onSuccess();
          onClose();
        } catch (e) {
          toast(e.message, 'error');
        } finally {
          setLoading(false);
        }
      }

      return (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="modal">
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 18 }}>
              {(() => { const av = getAvatar(`${prestador.nombre} ${prestador.apellido}`);
                return <div className="prestador-avatar" style={{ background: av.color + '20', color: av.color, width: 48, height: 48, fontSize: 18 }}>{av.initials}</div>; })()}
              <div>
                <div className="modal-title" style={{ marginBottom: 0 }}>{prestador.nombre} {prestador.apellido}</div>
                <div style={{ fontSize: 13, color: 'var(--ink-3)' }}>{prestador.email}</div>
              </div>
            </div>
            <p className="modal-sub">Selecciona la fecha y franja en que necesitas el servicio de limpieza.</p>

            <div className="modal-field">
              <label>Disponibilidad</label>
              <select value={dispId} onChange={e => setDispId(e.target.value)}>
                <option value="">— Selecciona una opción —</option>
                {disps.map(d => (
                  <option key={d.id} value={d.id}>
                    {fmtDate(d.fecha)} — {d.franja_horaria}
                  </option>
                ))}
              </select>
              {disps.length === 0 && <p style={{ fontSize: 12, color: 'var(--warn)', marginTop: 6 }}>No hay disponibilidades activas en este momento.</p>}
            </div>

            <div className="modal-actions">
              <button className="btn-cancel" onClick={onClose}>Cancelar</button>
              <button className="btn-confirm" onClick={confirmar} disabled={loading || !dispId}>
                {loading ? <span className="spinner" /> : 'Enviar solicitud'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════════
       PÁGINA: PRESTADORES DISPONIBLES
       ══════════════════════════════════════════════════ */
    function PaginaPrestadores() {
      const [prestadores, setPrestadores] = useState([]);
      const [loading, setLoading] = useState(true);
      const [busqueda, setBusqueda] = useState('');
      const [franja, setFranja] = useState('');
      const [selected, setSelected] = useState(null);
      const [contratando, setContratando] = useState(false);

      const cargar = useCallback(async () => {
        setLoading(true);
        try {
          const params = new URLSearchParams();
          if (busqueda) params.set('q', busqueda);
          if (franja) params.set('franja', franja);
          const data = await apiCall('GET', `/prestadores?${params}`);
          setPrestadores(data);
        } catch (e) {
          toast(e.message, 'error');
        } finally {
          setLoading(false);
        }
      }, [busqueda, franja]);

      useEffect(() => { cargar(); }, [cargar]);

      return (
        <div>
          <div className="page-header">
            <div>
              <h1 className="page-title">Limpiadores disponibles</h1>
              <p className="page-sub">Encuentra y contrata un limpiador para tu propiedad Airbnb</p>
            </div>
          </div>

          <div className="filters">
            <input
              className="filter-input"
              placeholder="🔍  Buscar por nombre..."
              value={busqueda}
              onChange={e => setBusqueda(e.target.value)}
            />
            <select className="filter-select" value={franja} onChange={e => setFranja(e.target.value)}>
              <option value="">Todas las franjas</option>
              <option value="mañana">Mañana</option>
              <option value="tarde">Tarde</option>
              <option value="noche">Noche</option>
            </select>
          </div>

          {loading ? (
            <div className="loading-overlay">
              <div className="spinner-dark" /> Cargando limpiadores...
            </div>
          ) : prestadores.length === 0 ? (
            <div className="empty">
              <div className="empty-icon">🧹</div>
              <div className="empty-title">No hay limpiadores disponibles</div>
              <div className="empty-text">Intenta cambiar los filtros de búsqueda</div>
            </div>
          ) : (
            <div className="prestadores-grid">
              {prestadores.map(p => {
                const av = getAvatar(`${p.nombre} ${p.apellido}`);
                const disps = (p.disponibilidades || []).filter(d => d.estado === 'disponible');
                return (
                  <div key={p.id} className="prestador-card">
                    <div className="prestador-header">
                      <div className="prestador-avatar" style={{ background: av.color + '20', color: av.color }}>{av.initials}</div>
                      <div>
                        <div className="prestador-name">{p.nombre} {p.apellido}</div>
                        <div className="prestador-email">{p.email}</div>
                      </div>
                    </div>
                    <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                      <span className="badge badge-green">● Activo</span>
                      <span className="badge badge-blue">{disps.length} disponibilidades</span>
                    </div>
                    <div className="disponibilidad-list">
                      {disps.slice(0, 3).map(d => (
                        <div key={d.id} className="disponibilidad-item">
                          <span className="disp-date">{fmtDate(d.fecha)}</span>
                          <span className="disp-hora">{d.franja_horaria}</span>
                          <span className="badge badge-green" style={{ fontSize: 10.5, padding: '2px 7px' }}>libre</span>
                        </div>
                      ))}
                      {disps.length > 3 && <div style={{ fontSize: 12, color: 'var(--ink-3)', textAlign: 'center', padding: 4 }}>+{disps.length - 3} más</div>}
                    </div>
                    <button
                      className="btn-contratar"
                      disabled={disps.length === 0}
                      onClick={() => { setSelected(p); setContratando(true); }}
                    >
                      Solicitar limpieza
                    </button>
                  </div>
                );
              })}
            </div>
          )}

          {contratando && selected && (
            <ModalContratar
              prestador={selected}
              onClose={() => { setContratando(false); setSelected(null); }}
              onSuccess={cargar}
            />
          )}
        </div>
      );
    }

    /* ══════════════════════════════════════════════════
       PÁGINA: MIS CONTRATACIONES
       ══════════════════════════════════════════════════ */
    function PaginaContrataciones() {
      const [contrataciones, setContrataciones] = useState([]);
      const [loading, setLoading] = useState(true);
      const [filtro, setFiltro] = useState('todas');

      const cargar = useCallback(async () => {
        setLoading(true);
        try {
          const data = await apiCall('GET', '/contrataciones/mis-contrataciones');
          setContrataciones(data);
        } catch (e) {
          toast(e.message, 'error');
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => { cargar(); }, [cargar]);

      const filtradas = filtro === 'todas' ? contrataciones : contrataciones.filter(c => c.estado === filtro);

      const estadoBadge = estado => {
        const m = { pendiente: ['badge-yellow', 'Pendiente'], aceptada: ['badge-green', 'Aceptada'], rechazada: ['badge-red', 'Rechazada'] };
        const [cls, label] = m[estado] || ['badge-gray', estado];
        return <span className={`badge ${cls}`}>{label}</span>;
      };

      return (
        <div>
          <div className="page-header">
            <div>
              <h1 className="page-title">Mis contrataciones</h1>
              <p className="page-sub">Historial de solicitudes de limpieza enviadas</p>
            </div>
          </div>

          <div className="filters" style={{ marginBottom: 20 }}>
            {['todas', 'pendiente', 'aceptada', 'rechazada'].map(f => (
              <button
                key={f}
                onClick={() => setFiltro(f)}
                style={{
                  padding: '7px 16px',
                  borderRadius: 20,
                  border: '1px solid',
                  borderColor: filtro === f ? 'var(--accent)' : 'var(--border)',
                  background: filtro === f ? 'var(--accent-bg)' : 'transparent',
                  color: filtro === f ? 'var(--accent)' : 'var(--ink-3)',
                  fontSize: 13,
                  cursor: 'pointer',
                  fontFamily: 'var(--font)',
                  fontWeight: 500,
                  textTransform: 'capitalize',
                  transition: 'all var(--transition)',
                }}
              >
                {f === 'todas' ? 'Todas' : f.charAt(0).toUpperCase() + f.slice(1)}
              </button>
            ))}
          </div>

          {loading ? (
            <div className="loading-overlay"><div className="spinner-dark" /> Cargando...</div>
          ) : filtradas.length === 0 ? (
            <div className="empty">
              <div className="empty-icon">📋</div>
              <div className="empty-title">Sin contrataciones</div>
              <div className="empty-text">Aún no has enviado solicitudes de limpieza</div>
            </div>
          ) : (
            filtradas.map(c => {
              const av = getAvatar(`${c.prestador_nombre} ${c.prestador_apellido}`);
              return (
                <div key={c.id} className="contratar-row">
                  <div className="prestador-avatar" style={{ background: av.color + '20', color: av.color, width: 38, height: 38, fontSize: 13, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, fontWeight: 600 }}>{av.initials}</div>
                  <div className="contratar-info">
                    <div className="contratar-name">{c.prestador_nombre} {c.prestador_apellido}</div>
                    <div className="contratar-meta">{fmtDate(c.fecha)} — {c.franja_horaria}</div>
                  </div>
                  {estadoBadge(c.estado)}
                  <div className="contratar-date">{fmtDateTime(c.solicitado_en)}</div>
                </div>
              );
            })
          )}
        </div>
      );
    }

    /* ══════════════════════════════════════════════════
       PÁGINA: NOTIFICACIONES
       ══════════════════════════════════════════════════ */
    function PaginaNotificaciones({ onRead }) {
      const [notifs, setNotifs] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        (async () => {
          try {
            const data = await apiCall('GET', '/notificaciones');
            setNotifs(data);
          } catch (e) {
            toast(e.message, 'error');
          } finally {
            setLoading(false);
          }
        })();
      }, []);

      async function marcarLeida(id) {
        try {
          await apiCall('PATCH', `/notificaciones/${id}/leer`);
          setNotifs(prev => prev.map(n => n.id === id ? { ...n, leida: true } : n));
          onRead();
        } catch {}
      }

      return (
        <div>
          <div className="page-header">
            <div>
              <h1 className="page-title">Notificaciones</h1>
              <p className="page-sub">Respuestas de tus solicitudes de limpieza</p>
            </div>
          </div>

          {loading ? (
            <div className="loading-overlay"><div className="spinner-dark" /> Cargando...</div>
          ) : notifs.length === 0 ? (
            <div className="empty">
              <div className="empty-icon">🔔</div>
              <div className="empty-title">Sin notificaciones</div>
              <div className="empty-text">Aquí aparecerán las respuestas a tus solicitudes</div>
            </div>
          ) : (
            notifs.map(n => (
              <div key={n.id} className="contratar-row" style={{ background: n.leida ? 'var(--surface)' : 'var(--accent-bg)', borderColor: n.leida ? 'var(--border)' : 'rgba(26,86,232,0.15)' }}>
                <div style={{ width: 8, height: 8, borderRadius: '50%', background: n.leida ? 'var(--surface-3)' : 'var(--accent)', flexShrink: 0 }} />
                <div className="contratar-info">
                  <div className="contratar-name" style={{ fontWeight: n.leida ? 400 : 600 }}>{n.mensaje}</div>
                  <div className="contratar-meta">{fmtDateTime(n.creado_en)}</div>
                </div>
                {!n.leida && (
                  <button
                    style={{ padding: '5px 12px', borderRadius: 6, border: '1px solid var(--border)', background: 'var(--surface)', fontSize: 12, cursor: 'pointer', fontFamily: 'var(--font)', color: 'var(--ink-2)', flexShrink: 0 }}
                    onClick={() => marcarLeida(n.id)}
                  >Marcar leída</button>
                )}
              </div>
            ))
          )}
        </div>
      );
    }

    /* ══════════════════════════════════════════════════
       APP PRINCIPAL
       ══════════════════════════════════════════════════ */
    function App() {
      const [user, setUser] = useState(() => {
        try { return JSON.parse(localStorage.getItem('cs_user')); } catch { return null; }
      });
      const [pagina, setPagina] = useState('dashboard');
      const [unread, setUnread] = useState(0);

      // Poll notificaciones no leídas
      useEffect(() => {
        if (!user) return;
        const check = async () => {
          try {
            const data = await apiCall('GET', '/notificaciones/unread-count');
            setUnread(data.count);
          } catch {}
        };
        check();
        const iv = setInterval(check, 30000);
        return () => clearInterval(iv);
      }, [user]);

      if (!user) return <AuthScreen onAuth={u => setUser(u)} />;

      const av = getAvatar(`${user.nombre} ${user.apellido}`);

      function logout() {
        localStorage.removeItem('cs_token');
        localStorage.removeItem('cs_user');
        setUser(null);
      }

      const navItems = [
        { id: 'dashboard', label: 'Inicio', icon: <IconHome /> },
        { id: 'prestadores', label: 'Limpiadores', icon: <IconUsers /> },
        { id: 'contrataciones', label: 'Mis solicitudes', icon: <IconList /> },
        { id: 'notificaciones', label: 'Notificaciones', icon: <IconBell />, badge: unread },
      ];

      return (
        <div id="app-root">
          <nav className="sidebar">
            <div className="sidebar-header">
              <div className="sidebar-logo">
                <div className="sidebar-logo-icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round"><path d="M17 3l4 4-3.5 3.5-4-4L17 3z"/><path d="M14 7L2 21"/></svg>
                </div>
                <span>Clean<span style={{ color: 'var(--accent)' }}>Stay</span></span>
              </div>
            </div>

            <div className="sidebar-nav">
              {navItems.map(item => (
                <button
                  key={item.id}
                  className={`nav-item ${pagina === item.id ? 'active' : ''}`}
                  onClick={() => setPagina(item.id)}
                >
                  {item.icon}
                  <span>{item.label}</span>
                  {item.badge > 0 && <span className="notif-badge">{item.badge}</span>}
                </button>
              ))}
            </div>

            <div className="sidebar-user">
              <div className="user-card">
                <div className="avatar avatar-blue" style={{ background: av.color + '20', color: av.color }}>{av.initials}</div>
                <div>
                  <div className="user-name">{user.nombre} {user.apellido}</div>
                  <div className="user-role">Arrendador</div>
                </div>
              </div>
              <button className="btn-logout" onClick={logout}>Cerrar sesión</button>
            </div>
          </nav>

          <main className="main">
            {pagina === 'dashboard'      && <PaginaDashboard user={user} onNavigate={setPagina} />}
            {pagina === 'prestadores'    && <PaginaPrestadores />}
            {pagina === 'contrataciones' && <PaginaContrataciones />}
            {pagina === 'notificaciones' && <PaginaNotificaciones onRead={() => setUnread(n => Math.max(0, n - 1))} />}
          </main>

          <ToastContainer />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
